name: Dealmatcher frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend_ci.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend_ci.yml"

jobs:
  frontend-ci:
    name: Dealmatcher frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/frontend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('src/frontend/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src/frontend/android/**/*.gradle*', 'src/frontend/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: Install dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build appbundle --release


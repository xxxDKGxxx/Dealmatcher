name: Trigger auto deployment for dealmatcher-backend-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ develop ]
    paths:
    - 'src/backend/**'
    - '.github/workflows/backend_cd_develop.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEALMATCHERBACKENDDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEALMATCHERBACKENDDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEALMATCHERBACKENDDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/src/backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.DEALMATCHERBACKENDDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DEALMATCHERBACKENDDEV_REGISTRY_PASSWORD }}
          containerAppName: dealmatcher-backend-dev
          resourceGroup: rg-dealmatcher
          imageToBuild: xxxdkgxxx/dealmatcher-backend-dev:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_



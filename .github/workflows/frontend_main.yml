name: Dealmatcher frontend CI

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend_main.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend_main.yml"

jobs:
  frontend-build:
    name: Dealmatcher frontend CI/CD
    runs-on: ubuntu-latest
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./src/frontend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter version
        run: flutter --version

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('src/frontend/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src/frontend/android/**/*.gradle*', 'src/frontend/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: Install dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --release

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src/frontend/build/app/outputs/bundle/release/app-release.aab

name: Dealmatcher frontend CD - dev

on:
  pull_request:
    branches: [ develop ]
    types:
      - closed
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend_main.yml"

jobs:
  frontend-cd-dev:
    name: Dealmatcher main frontend CD - dev
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/frontend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('src/frontend/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('src/frontend/android/**/*.gradle*', 'src/frontend/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}

      - name: Install dependencies
        run: flutter pub get

      - name: Build app
        run: flutter build apk --release

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: src/frontend/build/app/outputs/flutter-apk/app-release.apk

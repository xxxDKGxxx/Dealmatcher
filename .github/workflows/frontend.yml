name: Dealmatcher frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - "src/frontend/**"
      - ".github/workflows/dealmatcher-frontend-ci.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "src/frontend/**"
      - ".github/workflows/dealmatcher-frontend-ci.yml"

jobs:
  frontend-build:
    name: Dealmatcher frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/frontend

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze project
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build APK
        run: flutter build apk --release


services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dealmatcher-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD:-YourStr0ng!Passw0rd}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dealmatcher-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=Dealmatcher;User Id=sa;Password=${DB_SA_PASSWORD:-YourStr0ng!Passw0rd};TrustServerCertificate=True"
    depends_on:
      sqlserver:
        condition: service_healthy

volumes:
  sqlserver-data:
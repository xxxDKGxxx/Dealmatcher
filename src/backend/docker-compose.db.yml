services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dealmatcher-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD:-YourStr0ng!Passw0rd}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
